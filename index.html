<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Shop | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <h1 class="logo">ARCHIVE_SHOP</h1>
            <ul>
                <li><a href="index.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="https://www.instagram.com/ewiliepiellie" target="_blank" rel="noopener">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-image">
            <img src="images/header.JPG" alt="Archive Shop Collection">
            <div class="cta-container">
                <a href="#shop" class="cta-button">EXPLORE THE ARCHIVE</a>
            </div>
        </div>
    </section>

    <main id="shop" class="shop-container">
        
        <aside class="sidebar">
            <h3>FILTERS</h3>
            <div class="filter-group">
                <label><input type="checkbox" class="filter-check" value="all" checked> ALL ITEMS</label>
                <label><input type="checkbox" class="filter-check" value="sale"> SALE</label>
                <label><input type="checkbox" class="filter-check" value="limited"> LIMITED</label>
            </div>
        </aside>

        <div class="product-grid">
            <article class="product" data-category="sale">
                <div class="badge sale">SALE</div>
                <img src="images/adidaswhite.jpg" alt="Adidas White Wings">
                <div class="product-footer">
                    <h3 class="product-name">Adidas White Wings</h3>
                    <span class="price">€180.00</span>
                    <button class="buy-btn" data-name="Adidas White Wings" data-price="180.00">ADD TO CART</button>
                </div>
            </article>

            <article class="product" data-category="sale">
                <div class="badge sale">SALE</div>
                <img src="images/batmanjacket.jpg" alt="Batman Vintage Jacket">
                <div class="product-footer">
                    <h3 class="product-name">Batman Vintage Jacket</h3>
                    <span class="price">€245.00</span>
                    <button class="buy-btn" data-name="Batman Vintage Jacket" data-price="245.00">ADD TO CART</button>
                </div>
            </article>

            <article class="product" data-category="sale">
                <div class="badge sale">SALE</div>
                <img src="images/margiela.jpg" alt="Maison Margiela Tee">
                <div class="product-footer">
                    <h3 class="product-name">Maison Margiela Tee</h3>
                    <span class="price">€120.00</span>
                    <button class="buy-btn" data-name="Maison Margiela Tee" data-price="120.00">ADD TO CART</button>
                </div>
            </article>

            <article class="product" data-category="limited">
                <div class="badge limited">LIMITED EDITION</div>
                <img src="images/D&G.jpg" alt="D&G Archive Bomber">
                <div class="product-footer">
                    <h3 class="product-name">D&G Archive Bomber</h3>
                    <span class="price">€899.00</span>
                    <button class="buy-btn" data-name="D&G Archive Bomber" data-price="899.00">ADD TO CART</button>
                </div>
            </article>

            <article class="product" data-category="sale">
                <div class="badge sale">SALE</div>
                <img src="images/screamshirt.jpg" alt="Scream Movie Tee">
                <div class="product-footer">
                    <h3 class="product-name">Scream Movie Tee</h3>
                    <span class="price">€55.00</span>
                    <button class="buy-btn" data-name="Scream Movie Tee" data-price="55.00">ADD TO CART</button>
