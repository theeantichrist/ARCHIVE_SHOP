<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Shop | Cart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@800&display=swap" rel="stylesheet">
</head>
<body class="cart-page">
    <header>
        <nav>
            <h1 class="logo">YOUR CART</h1>
            <ul>
                <li><a href="index.html">Back to Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-container">
        <div class="cart-content">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>
            
            <div class="cart-summary">
                <div class="grand-total">
                    <span>GRAND TOTAL:</span>
                    <span id="total-price">€0.00</span>
                </div>
                <div class="cart-actions">
                    <button id="empty-cart" class="secondary-btn">EMPTY CART</button>
                    <button class="cta-button">CHECKOUT</button>
                </div>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 ARCHIVE_SHOP</p></footer>
    <script src="cart.js"></script>
</body>
</html>
